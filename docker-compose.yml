# Production: создайте .env из .env.example (или touch .env для минимального запуска).
services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    # Резолвинг DNS из контейнера (нужен для облачных БД, например Selectel)
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
    env_file: .env
    volumes:
      - screenshots:/app/server/storage/screenshots
    restart: unless-stopped

volumes:
  screenshots:
